<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TyNH</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Background Video -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="img/bg.mp4" type="video/mp4" />
  </video>

  <!-- Cursor Trail Canvas -->
  <canvas id="trailCanvas"></canvas>

  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <img src="img/avt.jpg" alt="TyNH" class="avatar" />
      <div class="avatar-ring"></div>
    </div>

    <!-- Tên + mô tả -->
    <h1 class="name">TyNH</h1>
    <p class="bio">Thi sĩ hám sắc - nếu bạn có thể phân tích tên của mình thì bạn sẽ hiểu mong muốn của mình.</p>
    <p class="note">bạn nào đó quay lại đây vào ngày 25/7/2026 nhé 🤍</p>

    <!-- Like button -->
    <div class="stats-wrap">
      <div class="like-wrap">
        <button class="like-btn" id="likeBtn" type="button">
          <i class="fas fa-heart"></i>
        </button>
        <span class="like-count" id="likeCount">—</span>
      </div>
      <div class="divider-v"></div>
      <div class="views-wrap">
        <i class="fas fa-eye views-icon"></i>
        <span class="views-count" id="viewCount">—</span>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Liên hệ -->
    <div class="contact-links" id="contactLinks">
      <!-- Được render bởi script.js từ contact.js -->
    </div>

  </div>

  <!-- Music Player -->
  <div class="player" id="player">
    <button class="player-toggle" id="playerToggle" type="button" title="Ẩn/hiện player">
      <i class="fas fa-music" style="color:var(--accent);font-size:0.8rem"></i>
      <span class="player-toggle-label">MUSIC</span>
      <span class="player-now-playing" id="nowPlayingLabel">—</span>
      <i class="fas fa-chevron-down"></i>
    </button>
    <div class="player-body" id="playerBody">
      <div class="player-info">
        <div class="player-title" id="playerTitle">—</div>
        <div class="player-artist" id="playerArtist">—</div>
      </div>
      <div class="player-progress-wrap">
        <span class="player-time" id="currentTime">0:00</span>
        <input type="range" class="player-progress" id="progressBar" value="0" min="0" step="0.1" />
        <span class="player-time" id="totalTime">0:00</span>
      </div>
      <div class="player-controls">
        <button class="p-btn" id="prevBtn" type="button" title="Bài trước"><i class="fas fa-backward-step"></i></button>
        <button class="p-btn p-play" id="playBtn" type="button" title="Play/Pause"><i class="fas fa-play"></i></button>
        <button class="p-btn" id="nextBtn" type="button" title="Bài tiếp"><i class="fas fa-forward-step"></i></button>
        <button class="p-btn p-small" id="shuffleBtn" type="button" title="Shuffle"><i class="fas fa-shuffle"></i></button>
        <button class="p-btn p-small" id="repeatBtn" type="button" title="Lặp lại"><i class="fas fa-repeat"></i></button>
        <div class="volume-wrap">
          <i class="fas fa-volume-low vol-icon"></i>
          <input type="range" class="volume-bar" id="volumeBar" value="80" min="0" max="100" />
        </div>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>

  <script src="config.js"></script>
  <script src="contact.js"></script>
  <script src="songs.js"></script>
  <script src="script.js"></script>
</body>
</html>
