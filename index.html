<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TyNH</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <div class="card">

    <!-- Avatar -->
    <div class="avatar-wrap">
      <img src="img/avt.jpg" alt="TyNH" class="avatar" />
      <div class="avatar-ring"></div>
    </div>

    <!-- Tên + mô tả -->
    <h1 class="name">TyNH</h1>
    <p class="bio">Mô tả về bản thân bạn ở đây. Có thể là nghề nghiệp, sở thích, hay bất cứ điều gì bạn muốn giới thiệu.</p>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Liên hệ -->
    <div class="contact-links" id="contactLinks">
      <!-- Được render bởi script.js từ contact.js -->
    </div>

  </div>

  <script src="contact.js"></script>
  <script src="script.js"></script>
</body>
</html>
